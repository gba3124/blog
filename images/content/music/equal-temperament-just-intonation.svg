<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <style>
    text {
      font-family: Arial, sans-serif;
      font-size: 14px;
    }
    .title {
      font-size: 20px;
      font-weight: bold;
    }
    .subtitle {
      font-size: 16px;
    }
    .axis-label {
      font-size: 12px;
    }
    .just-bar {
      fill: #4285f4;
      opacity: 0.8;
    }
    .equal-bar {
      fill: #ea4335;
      opacity: 0.8;
    }
    .error-line {
      stroke: #444;
      stroke-width: 2;
      stroke-dasharray: 5,3;
    }
    .error-text {
      font-size: 12px;
      fill: #444;
    }
    .legend-text {
      font-size: 14px;
    }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8f9fa"/>
  
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">Comparison of Equal Temperament vs Just Intonation</text>
  <text x="400" y="55" text-anchor="middle" class="subtitle">Frequency Ratio Comparison</text>
  
  <!-- Legend -->
  <rect x="580" y="80" width="20" height="14" class="just-bar"/>
  <text x="610" y="92" class="legend-text">Just Intonation</text>
  <rect x="580" y="105" width="20" height="14" class="equal-bar"/>
  <text x="610" y="117" class="legend-text">Equal Temperament</text>
  
  <!-- Interval Names -->
  <g>
    <text x="100" y="122" text-anchor="end">Octave</text>
    <text x="100" y="152" text-anchor="end">Perfect Fifth</text>
    <text x="100" y="182" text-anchor="end">Perfect Fourth</text>
    <text x="100" y="212" text-anchor="end">Major Third</text>
    <text x="100" y="242" text-anchor="end">Minor Third</text>
    <text x="100" y="272" text-anchor="end">Major Sixth</text>
    <text x="100" y="302" text-anchor="end">Minor Sixth</text>
    <text x="100" y="332" text-anchor="end">Major Second</text>
    <text x="100" y="362" text-anchor="end">Minor Second</text>
    <text x="100" y="392" text-anchor="end">Tritone</text>
  </g>
  
  <!-- X-axis -->
  <line x1="120" y1="420" x2="560" y2="420" stroke="black" stroke-width="1"/>
  <g>
    <text x="120" y="440" text-anchor="middle" class="axis-label">1.0</text>
    <text x="230" y="440" text-anchor="middle" class="axis-label">1.2</text>
    <text x="340" y="440" text-anchor="middle" class="axis-label">1.4</text>
    <text x="450" y="440" text-anchor="middle" class="axis-label">1.6</text>
    <text x="560" y="440" text-anchor="middle" class="axis-label">1.8</text>
    <text x="625" y="440" text-anchor="middle" class="axis-label">2.0</text>
  </g>
  <text x="340" y="465" text-anchor="middle">Frequency Ratio</text>
  
  <!-- Frequency Ratio Bars -->
  <!-- Octave -->
  <rect x="120" y="110" width="505" height="14" class="just-bar"/>
  <rect x="120" y="125" width="505" height="14" class="equal-bar"/>
  <text x="630" y="127" class="error-text">0.00%</text>
  
  <!-- Perfect Fifth -->
  <rect x="120" y="140" width="380" height="14" class="just-bar"/>
  <rect x="120" y="155" width="378" height="14" class="equal-bar"/>
  <text x="630" y="157" class="error-text">-0.11%</text>
  <line x1="500" y1="147" x2="498" y2="162" class="error-line"/>
  
  <!-- Perfect Fourth -->
  <rect x="120" y="170" width="234" height="14" class="just-bar"/>
  <rect x="120" y="185" width="236" height="14" class="equal-bar"/>
  <text x="630" y="187" class="error-text">+0.11%</text>
  <line x1="354" y1="177" x2="356" y2="192" class="error-line"/>
  
  <!-- Major Third -->
  <rect x="120" y="200" width="150" height="14" class="just-bar"/>
  <rect x="120" y="215" width="161" height="14" class="equal-bar"/>
  <text x="630" y="217" class="error-text">+0.79%</text>
  <line x1="270" y1="207" x2="281" y2="222" class="error-line"/>
  
  <!-- Minor Third -->
  <rect x="120" y="230" width="120" height="14" class="just-bar"/>
  <rect x="120" y="245" width="110" height="14" class="equal-bar"/>
  <text x="630" y="247" class="error-text">-0.90%</text>
  <line x1="240" y1="237" x2="230" y2="252" class="error-line"/>
  
  <!-- Major Sixth -->
  <rect x="120" y="260" width="434" height="14" class="just-bar"/>
  <rect x="120" y="275" width="445" height="14" class="equal-bar"/>
  <text x="630" y="277" class="error-text">+0.91%</text>
  <line x1="554" y1="267" x2="565" y2="282" class="error-line"/>
  
  <!-- Minor Sixth -->
  <rect x="120" y="290" width="400" height="14" class="just-bar"/>
  <rect x="120" y="305" width="391" height="14" class="equal-bar"/>
  <text x="630" y="307" class="error-text">-0.79%</text>
  <line x1="520" y1="297" x2="511" y2="312" class="error-line"/>
  
  <!-- Major Second -->
  <rect x="120" y="320" width="63" height="14" class="just-bar"/>
  <rect x="120" y="335" width="62" height="14" class="equal-bar"/>
  <text x="630" y="337" class="error-text">-0.23%</text>
  <line x1="183" y1="327" x2="182" y2="342" class="error-line"/>
  
  <!-- Minor Second -->
  <rect x="120" y="350" width="33" height="14" class="just-bar"/>
  <rect x="120" y="365" width="30" height="14" class="equal-bar"/>
  <text x="630" y="367" class="error-text">-0.68%</text>
  <line x1="153" y1="357" x2="150" y2="372" class="error-line"/>
  
  <!-- Tritone -->
  <rect x="120" y="380" width="275" height="14" class="just-bar"/>
  <rect x="120" y="395" width="286" height="14" class="equal-bar"/>
  <text x="630" y="397" class="error-text">+1.02%</text>
  <line x1="395" y1="387" x2="406" y2="402" class="error-line"/>
  
  <!-- Note -->
  <text x="400" y="490" text-anchor="middle" font-style="italic">
    Equal temperament approximates just intonation intervals with errors mostly within ±1%
  </text>
</svg>
