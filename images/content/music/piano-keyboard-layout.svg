<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <title>Piano Keyboard Layout</title>
  
  <!-- White keys -->
  <g id="white-keys">
    <rect x="0" y="0" width="100" height="200" fill="white" stroke="black" stroke-width="2" />
    <rect x="100" y="0" width="100" height="200" fill="white" stroke="black" stroke-width="2" />
    <rect x="200" y="0" width="100" height="200" fill="white" stroke="black" stroke-width="2" />
    <rect x="300" y="0" width="100" height="200" fill="white" stroke="black" stroke-width="2" />
    <rect x="400" y="0" width="100" height="200" fill="white" stroke="black" stroke-width="2" />
    <rect x="500" y="0" width="100" height="200" fill="white" stroke="black" stroke-width="2" />
    <rect x="600" y="0" width="100" height="200" fill="white" stroke="black" stroke-width="2" />
  </g>
  
  <!-- Black keys -->
  <g id="black-keys">
    <rect x="70" y="0" width="60" height="120" fill="black" stroke="black" stroke-width="1" />
    <rect x="170" y="0" width="60" height="120" fill="black" stroke="black" stroke-width="1" />
    <rect x="370" y="0" width="60" height="120" fill="black" stroke="black" stroke-width="1" />
    <rect x="470" y="0" width="60" height="120" fill="black" stroke="black" stroke-width="1" />
    <rect x="570" y="0" width="60" height="120" fill="black" stroke="black" stroke-width="1" />
  </g>
  
  <!-- Note labels (simplified) -->
  <g id="note-labels" font-family="Arial" font-size="20" text-anchor="middle">
    <text x="50" y="180" fill="black">C</text>
    <text x="150" y="180" fill="black">D</text>
    <text x="250" y="180" fill="black">E</text>
    <text x="350" y="180" fill="black">F</text>
    <text x="450" y="180" fill="black">G</text>
    <text x="550" y="180" fill="black">A</text>
    <text x="650" y="180" fill="black">B</text>
  </g>
</svg>
